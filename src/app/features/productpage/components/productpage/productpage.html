<div class="product-page">

  <div class="product-page-top">
    <app-product-photos
    [images]="product.images"
    [offer]="offer.percentage"
    ></app-product-photos>

    <app-product-info 
    [product]="product"
    [offer]="offer"></app-product-info>
  </div>

  <div class="craftsman">
    <app-craftsman-info></app-craftsman-info>
  </div>
  
  <div class="product-page-bottom">
    <app-reviews-container
      *ngIf="product"
      [comments]="product.comments">
    </app-reviews-container>
  </div>

</div>
