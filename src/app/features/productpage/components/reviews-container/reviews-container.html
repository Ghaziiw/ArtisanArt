<div class="reviews-container">
  <!-- Alert Messages -->
  <div
    *ngIf="showMessage"
    class="global-message"
    [ngClass]="{
      'success-message': message.type === 'success',
      'error-message': message.type === 'error',
      hiding: isHiding
    }"
  >
    {{ message.text }}
  </div>

  <!--review form-->
  <div class="review-form-container">
    <h3 class="review-intro">Leave a Review</h3>
    <form (ngSubmit)="submit()">
      <p>Your Rating</p>

      <div class="stars">
        <span *ngFor="let s of stars" (click)="setRating(s)">
          <svg xmlns="http://www.w3.org/2000/svg"width="24"height="24"viewBox="0 0 24 24"[ngClass]="{ filled: s <= mark, empty: s > mark }"stroke="#A64D4D"stroke-width="2"stroke-linecap="round"stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" /> </svg>
        </span>
      </div>

      <div>
        <textarea
          placeholder="Write your review here..."
          [(ngModel)]="content"
          name="content"
          class="comment"
          [disabled]="isSubmitting"
        >
        </textarea>
      </div>

      <div>
        <button type="submit" class="publish-btn" [disabled]="isSubmitting">
          <svg *ngIf="isSubmitting"class="spinner"xmlns="http://www.w3.org/2000/svg"width="18"height="18"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg>
          <span *ngIf="!isSubmitting">Publish Review</span>
          <span *ngIf="isSubmitting">Publishing...</span>
        </button>
      </div>
    </form>
  </div>

  <!--product reviews-->
  <div class="review" *ngFor="let comment of comments">
    <img [src]="comment.user?.image || '/assets/images/seller1.jpg'" class="avatar" />

    <div class="review-header">
      <span class="client-name">{{ comment.user?.name }}</span>
      <span class="date">{{ dateOnly(comment.createdAt) }}</span>

      <div class="rating">
        <span *ngFor="let star of getStarsArray(comment.mark)">
          <svg xmlns="http://www.w3.org/2000/svg"width="20"height="20"viewBox="0 0 24 24"fill="#A64D4D"stroke="#A64D4D"stroke-width="2"stroke-linecap="round"stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
        </span>
      </div>

      <div class="content">
        <p>{{ comment.content }}</p>
      </div>
    </div>
  </div>
</div>

<div
  [hidden]="!showMessage"
  class="global-message"
  [ngClass]="{
    'success-message': message.type === 'success',
    'error-message': message.type === 'error',
    hiding: isHiding
  }"
>
  {{ message.text }}
</div>
