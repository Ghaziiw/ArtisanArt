<app-header></app-header>

<div class="horizontal-div" *ngIf="viewType === 'products'">
  <app-search-filters-bar (filtersChange)="onFiltersChange($event)"></app-search-filters-bar>
  <app-search-results-tab [filters]="currentFilters"></app-search-results-tab>
</div>

<div
  class="artisan-search"
  style="
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 1250px;
    margin: auto;
  "
  *ngIf="viewType === 'artisans'"
>
  <div *ngFor="let artisan of craftsmen">
    <app-artisan-card [craftsman]="artisan"></app-artisan-card>
  </div>
</div>

<app-footer></app-footer>
