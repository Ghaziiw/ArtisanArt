<div class="product-card">
  <div class="product-image">
    <img [src]="'/assets/images/chachya.webp'" alt="product-image">
  </div>
  <div class="content">
    <div>
      <h2 class="title">Premium Wireless Headphones</h2>
      <p class="description">High-quality sound with noise cancellation and comfortable fit for all-day wear.</p>
    </div>
    <div class="price-rating">
      <div class="price">
        <span class="muted-text">$399.99</span>
        <span class="text-destructive">$299.99</span>
        </div>
      <div class="rating">
        <span class="stars">★</span>
        <span>4.8 (342)</span>
      </div>
    </div>
  </div>
  <div class="seller">
    <img [src]="'/assets/images/seller1.jpg'" alt="Seller" class="seller-avatar">
    <div class="seller-name">TechGear Store</div>
    <div class="location">New York, USA</div>
    <div class="seller-rating">
      <span class="stars">★</span>
      <span>4.9 (1250)</span>
    </div>
  </div>
</div>
