<!-- search-results-tab.component.html -->
<div *ngIf="isLoading" class="loading-products">
  <p>Loading products...</p>
</div>

<div *ngIf="!isLoading && products.length > 0">
  <app-item-display *ngFor="let product of products" [product]="product"></app-item-display>
</div>

<div *ngIf="!isLoading && products.length === 0" class="no-results">
  <p>No products found with these filters.</p>
</div>
