<div class="sidebar">
      <h2 class="title">Filters & Sort</h2>

      <div class="section">
        <div class="section-title">Sort By</div>
        <select>
          <option>Most Relevant</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
          <option>Newest Arrivals</option>
        </select>
      </div>

      <hr>

      <div class="section">
        <div class="section-title">Category</div>
        <div class="checkbox-group">
          <label class="checkbox-item" *ngFor="let category of categories">
            <input type="checkbox">
            <span>{{ category.name }}</span>
          </label>
        </div>
      </div>

      <hr>

    <div class="section">
  <div class="section-title">Price Range</div>
    <div class="price-inputs">
      <div class="price-field">
        <span>$</span>
        <input type="number" class="price-min" value="0" min="0">
      </div>
      <!-- <span class="separator">–</span> -->
      <div class="price-field">
        <span>$</span>
        <input type="number" class="price-max" value="1000" max="9999">
      </div>
    </div>
    </div>
      <hr>

      <div class="section">
        <div class="section-title">Minimum Rating</div>
        <div class="checkbox-group">
          <label class="radio-item"><input type="radio" name="rating" checked><span>All Ratings</span></label>
          <label class="radio-item"><input type="radio" name="rating"><span>4★ & Above</span></label>
          <label class="radio-item"><input type="radio" name="rating"><span>4.5★ & Above</span></label>
        </div>
      </div>

      <hr>

      <div class="section">
        <div class="section-title">Shipping Options</div>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox"><span>Free Shipping</span></label>
          <label class="checkbox-item"><input type="checkbox"><span>Fast Delivery</span></label>
        </div>
      </div>

      <hr>

      <div class="section">
        <div class="section-title">Condition</div>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" checked><span>New</span></label>
          <label class="checkbox-item"><input type="checkbox"><span>Used</span></label>
          <label class="checkbox-item"><input type="checkbox"><span>Refurbished</span></label>
        </div>
      </div>
</div>
