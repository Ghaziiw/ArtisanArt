<div class="sidebar">
      <h2 class="title">Filters & Sort</h2>

      <div class="section">
        <div class="section-title">Sort By</div>
        <select class="sort-select" [(ngModel)]="sortByPrice" (change)="onFilterChange()">
          <option [value]="undefined" selected disabled>Choose an option</option>
          <option value="asc">Price: Low to High</option>
          <option value="desc">Price: High to Low</option>
        </select>
      </div>

      <hr>

      <div class="section">
        <div class="section-title">Product Name</div>
        <input
          type="text"
          class="text-input"
          placeholder="Search product..."
          [(ngModel)]="productName"
          (input)="onFilterChange()"
        />
      </div>

      <hr>

      <div class="section">
        <div class="section-title">Category</div>
        <div class="checkbox-group">
          <label class="checkbox-item" *ngFor="let category of categories">
            <input type="checkbox" [checked]="selectedCategories.includes(category.id)" (change)="toggleCategory(category.id, $event)">
            <span>{{ category.name }}</span>
          </label>
        </div>
      </div>

      <hr>

    <div class="section">
      <div class="section-title">Price Range</div>
        <div class="price-inputs">
          <div class="price-field">
            <span>$</span>
            <input type="number" placeholder="0" class="price-min" value="0" min="0" [(ngModel)]="minPrice" (input)="onFilterChange()">
          </div>
          <div class="price-field">
            <span>$</span>
            <input type="number" placeholder="1000" class="price-max" value="1000" max="9999" min="0" [(ngModel)]="maxPrice" (input)="onFilterChange()">
          </div>
      </div>
    </div>
      <hr>

      <div class="section">
        <div class="section-title">Minimum Rating</div>
        <div class="checkbox-group">
          <label class="radio-item"><input type="radio" name="rating" [(ngModel)]="minRating" (change)="onFilterChange()" [value]="0" checked><span>All Ratings</span></label>
          <label class="radio-item"><input type="radio" name="rating" [(ngModel)]="minRating" (change)="onFilterChange()" [value]="3"><span>3★ & Above</span></label>
          <label class="radio-item"><input type="radio" name="rating" [(ngModel)]="minRating" (change)="onFilterChange()" [value]="4"><span>4★ & Above</span></label>
          <label class="radio-item"><input type="radio" name="rating" [(ngModel)]="minRating" (change)="onFilterChange()" [value]="4.5"><span>4.5★ & Above</span></label>
        </div>
      </div>

      <hr>

      <div class="section">
        <div class="section-title">Craftsman Name</div>
        <input
          type="text"
          class="text-input"
          placeholder="Search craftsman..."
          [(ngModel)]="craftsmanName"
          (input)="onFilterChange()"
        />
      </div>

      <hr>

      <div class="section">
        <div class="section-title">Shipping Options</div>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" [(ngModel)]="freeShipping" (change)="onFilterChange()"><span>Free Shipping</span></label>
        </div>
      </div>
</div>
