<div class="product-card" (click)="navigateToProduct($event)">
    <div class="discount-badge" *ngIf="hasDiscount">-{{ discountPercentage }}%</div>
    <img [src]="productImage" [alt]="product.name">
    <div class="category-tag">{{ categoryName }}</div>
    
    <div class="product-infos">
        <h3 class="product-title">{{ product.name }}</h3>
        <p class="product-description">{{ product.description }}</p>
        
        <div class="price-and-rating">
            <div class="price-container">
                <span class="old-price" *ngIf="hasDiscount">${{ product.price }}</span>
                <span class="current-price">${{ currentPrice }}</span>
            </div>
            
            <div class="rating">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#ffd500" stroke="#ffd500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
                <span class="rating-text">{{ product.avgRating || 0 }} ({{ product.totalComments || 0 }} reviews)</span>
            </div>
        </div>
    </div>
</div>
