<div class="container">

  <!-- Informations personnelles -->
  <div class="card">
    <p class="title">Informations personnelles</p>

    <form #infoForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <div class="field-content">
            <div class="icon-label-wrapper">
              <div class="field-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                fill="none" stroke="#C78A81" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              </div>
              <label>Full name</label>
            </div>
              <input
              type="text"
              [(ngModel)]="user.fullName"
              name="fullName"
              required
              class="input"
              placeholder="Votre nom complet"
              />
        </div>
      </div>

      <div class="field">
        <div class="field-content">
          <div class="icon-label-wrapper">
            <div class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="#C78A81" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </div>
          <label>Email</label>
        </div>
          <input
            type="email"
            [(ngModel)]="user.email"
            name="email"
            required
            email
            class="input"
          />
        </div>
      </div>

      <div class="field">
        <div class="field-content">
          <div class="icon-label-wrapper">

            <div class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="#C78A81" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
          </div>
          <label>Location</label>
        </div>
          <input
          type="text"
          [(ngModel)]="user.location"
          name="location"
          class="input"
          placeholder="ex: Paris, France"
          id="location-input-btn"
          />
        </div>
      </div>

      <button
        type="submit"
        class="save-btn"
        [disabled]="!infoForm.valid">
        Save Changes
      </button>
    </form>
  </div>

  <div class="card password-card">
    <div class="password-btn-label">
      <h3>Password</h3>
      <button type="button" class="change-password-btn" (click)="onChangePassword()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      Change Pasword
    </button>
  </div>
  <p class="password-hint">
    Your password is protected. click on "Change password" to change it.
  </p>
  </div>

</div>
