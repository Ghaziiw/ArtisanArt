<app-header></app-header>

<div class="main-page">
  <div class="horizontal-div" id="top-section">
    <div style="display: flex; justify-content: center; gap: 20px;" >
      <button class="return-btn" routerLink="/">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#935653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Return
      </button>
      <div class="vertical-div" id="top-titles">
        <h3>Shopping History</h3>
        <p>Check all the orders that you made</p>
      </div>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#923023" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-package w-10 h-10 text-primary" aria-hidden="true"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"></path><path d="M12 22V12"></path><polyline points="3.29 7 12 12 20.71 7"></polyline><path d="m7.5 4.27 9 5.15"></path></svg>
  </div>


  <!-- Empty orders -->
  <div *ngIf="orders?.meta?.totalItems === 0" class="empty-cart">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#925653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-history-icon lucide-history"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
    <h2>No orders yet!</h2>
    <p>You haven’t placed any orders yet.</p>
    <button class="keep-shopping-btn" routerLink="/">Keep Shopping</button>
  </div>

  <div *ngFor="let item of orders?.items">
    <app-order-card [orderDetails]="item"></app-order-card>
  </div>

</div>

<app-footer></app-footer>
