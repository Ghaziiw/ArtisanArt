<app-header></app-header>

<div class="faq-container">
  <h1>Frequently Asked Questions</h1>
  <p class="intro">Here are some of the most common questions about using ArtisanArt.</p>

  <div class="faq-list">
    <div class="faq-item" *ngFor="let faq of faqs; let i = index">
      <div class="question" (click)="toggleFaq(i)">
        <span>{{ faq.question }}</span>
        <span class="toggle-icon">{{ faq.open ? '-' : '+' }}</span>
      </div>
      <div class="answer" *ngIf="faq.open">
        {{ faq.answer }}
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
