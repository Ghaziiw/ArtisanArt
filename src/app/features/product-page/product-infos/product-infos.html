<div class="main-body">
   
        

    <div class="product-page">
      <div class="product-gallery">
        <div class="main-image">
          <img [src]="product.images[selectedImage]" [alt]="product.name">
          <span class="discount-badge">{{ product.discount }}</span>
      </div>
    
        <div class="thumbnail-list">
          <div 
            *ngFor="let image of product.images; let i = index" 
            class="thumbnail"
            [class.active]="selectedImage === i"
            (click)="selectImage(i)">
            <img [src]="image" [alt]="product.name">
          </div>
        </div>
      </div>

      <div class="product-details">
        <p class="category">{{ product.category }}</p>

        <h1 class="product-title">{{ product.name }}</h1>

        <div class="rating">
          <div class="stars">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="#925653" stroke="#925653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star-icon lucide-star"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/></svg>
          </div>
          <span class="rating-text">{{ product.rating }} ({{ product.reviewCount }} avis)</span>
        </div>

        <div class="price-section">
          <span class="original-price">${{ product.originalPrice }}</span>
          <span class="current-price">${{ product.currentPrice }}</span>
          <span class="savings-badge">Save ${{ product.savings }}</span>
        </div>

        <div class="description-section">
          <h3>Description</h3>
          <p>{{ product.description }}</p>
        </div>

        <div class="stock-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#925653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-package-icon lucide-package"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/><path d="m7.5 4.27 9 5.15"/></svg>
          <span>{{ product.stock }} In stock</span>
        </div>

        <div class="quantity-section">
          <label>Quantité:</label>
          <div class="quantity-controls">
            <button (click)="decreaseQuantity()" [disabled]="quantity <= 1">-</button>
            <input type="number" [(ngModel)]="quantity" [min]="1" [max]="product.stock" readonly>
            <button (click)="increaseQuantity()" [disabled]="quantity >= product.stock">+</button>
          </div>
        </div>

        <div class="action-buttons">
          <button class="add-to-cart" (click)="addToCart()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart-icon lucide-shopping-cart"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                Ajouter au panier
            </button>
          <button class="wishlist-btn" (click)="addToWishlist()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
</div>
