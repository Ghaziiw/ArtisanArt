<div class="hero-section">
    <h1>Log into your account</h1>
    <h3>Welcome! Please connect to your account</h3>
</div>

<div class="login-container">
  <div class="login-card">
    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
      
      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">
          <span class="icon-email"></span>
          Email
        </label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-input"
          [(ngModel)]="credentials.email"
          required
          email
          #emailInput="ngModel"
        />
        <div class="error-message" *ngIf="emailInput.invalid && emailInput.touched">
          <span *ngIf="emailInput.errors?.['required']">L'email est requis</span>
          <span *ngIf="emailInput.errors?.['email']">Email invalide</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">
          <span class="icon-lock"></span>
          Mot de passe
        </label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="form-input"
          [(ngModel)]="credentials.password"
          required
          minlength="6"
          #passwordInput="ngModel"
        />
        <div class="error-message" *ngIf="passwordInput.invalid && passwordInput.touched">
          <span *ngIf="passwordInput.errors?.['required']">Le mot de passe est requis</span>
          <span *ngIf="passwordInput.errors?.['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="btn-submit"
        [disabled]="loginForm.invalid"
      >
        Se connecter
      </button>

      <!-- Error Message (for login errors) -->
      <div class="login-error" *ngIf="loginError">
        {{ loginError }}
      </div>

      <!-- Sign Up Link -->
      <div class="signup-link">
        <a href="#" (click)="onSignUpClick($event)">
          Pas encore de compte? Inscrivez-vous
        </a>
      </div>

    </form>
  </div>
</div>
